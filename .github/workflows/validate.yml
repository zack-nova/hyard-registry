name: Validate catalog

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run validator tests
        run: |
          set -e
          for test_file in test/*_test.rb; do
            ruby "$test_file"
          done

      - name: Validate catalog
        run: ruby scripts/validate_catalog.rb .

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install hyard
        run: go install github.com/zack-nova/harnessyard/cmd/hyard@main

      - name: Revalidate registry entries
        run: HYARD_BIN="$(go env GOPATH)/bin/hyard" ruby scripts/revalidate_catalog.rb .
