name: Validate catalog

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run validator tests
        run: |
          set -e
          for test_file in test/*_test.rb; do
            ruby "$test_file"
          done

      - name: Validate catalog
        run: ruby scripts/validate_catalog.rb .
